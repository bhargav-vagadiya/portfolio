name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject EmailJS secrets
        run: |
          sed -i "s|YOUR_PUBLIC_KEY|${{ secrets.EMAILJS_PUBLIC_KEY }}|g"   index.html
          sed -i "s|YOUR_SERVICE_ID|${{ secrets.EMAILJS_SERVICE_ID }}|g"   app.js
          sed -i "s|YOUR_TEMPLATE_ID|${{ secrets.EMAILJS_TEMPLATE_ID }}|g" app.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
